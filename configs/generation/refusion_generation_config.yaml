_target_: src.denoiser.diffusion.ReFusionGenerationConfig
do_sample: false  # ReFusion ignores HF `do_sample`; `temperature` controls stochasticity.
temperature: 0.0  # `0.0` is deterministic; any nonzero value applies Gumbel-noise sampling.
use_cache: true
slot_size: 8
serial_num_blocks: 2
slot_threshold: 0.9
token_threshold: 0.9
