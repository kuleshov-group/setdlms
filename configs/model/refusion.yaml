defaults:
  - base@_here_
  - _self_

_target_: src.denoiser.diffusion.ReFusion
config:
  _target_: src.denoiser.diffusion.ReFusionConfig
  # Eval loading wires mask/eos/bos/pad token ids explicitly from the tokenizer.
  # ReFusion requires a real tokenizer mask token and will fail if it is missing.
  slot_size_set: [4, 8, 16, 32]
  training_eps: 1.0e-3
  ignore_index: -100
  backbone_config:
    automodel_cls: AutoModelForCausalLM
    use_causal_mask: true
